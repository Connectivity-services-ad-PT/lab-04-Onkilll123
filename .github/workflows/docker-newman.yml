name: Lab04 — Access Gate Docker & Newman (team-gate)

on:
  push:
  pull_request:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/team-gate

jobs:
  docker-newman:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Node dependencies
        run: npm ci

      - name: Lint OpenAPI contract
        run: npm run lint:openapi

      - name: Build Docker image
        run: |
          docker build -t fit4110/access-gate:lab04 . 2>&1 | tee docs/build-log.txt
          echo "=== BUILD COMPLETE ===" >> docs/build-log.txt
          docker images fit4110/access-gate:lab04 >> docs/build-log.txt

      - name: Run Docker container
        run: |
          docker run -d --rm \
            --name fit4110-gate-lab04 \
            -p 8000:8000 \
            --env-file .env.example \
            fit4110/access-gate:lab04

      - name: Wait for service (TCP port check)
        run: npx wait-on tcp:8000 --timeout 30000

      - name: Health check
        run: |
          echo "=== HEALTH CHECK ===" | tee docs/run-log.txt
          curl -s http://localhost:8000/health | tee -a docs/run-log.txt
          echo "" >> docs/run-log.txt
          echo "=== CONTAINER STATUS ===" >> docs/run-log.txt
          docker ps --filter "name=fit4110-gate-lab04" >> docs/run-log.txt

      - name: Run Newman against Docker container
        run: npm run test:local 2>&1 | tee docs/newman-run-log.txt

      - name: Capture container logs
        run: |
          docker logs fit4110-gate-lab04 > docs/container-log.txt 2>&1 || true

      - name: Show container logs on failure
        if: failure()
        run: docker logs fit4110-gate-lab04 || true

      - name: Stop container
        if: always()
        run: docker stop fit4110-gate-lab04 || true

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image to ghcr.io
        if: github.event_name == 'push'
        run: |
          IMAGE_TAG=ghcr.io/${{ github.repository_owner }}/team-gate:v0.1.0-team-gate
          docker tag fit4110/access-gate:lab04 $IMAGE_TAG
          docker push $IMAGE_TAG
          echo "=== IMAGE PUSHED ===" 
          echo "Tag: $IMAGE_TAG"

      - name: Upload Newman reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lab04-gate-evidence
          path: |
            reports/
            docs/build-log.txt
            docs/run-log.txt
            docs/newman-run-log.txt
            docs/container-log.txt
