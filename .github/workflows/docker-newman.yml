name: Lab04 — Access Gate Docker & Newman (team-gate)

on:
  push:
  pull_request:

jobs:
  docker-newman:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Node dependencies
        run: npm ci

      - name: Lint OpenAPI contract
        run: npm run lint:openapi

      - name: Build Docker image
        run: |
          docker build -t fit4110/access-gate:lab04 .
          echo "=== Image info ===" 
          docker images fit4110/access-gate:lab04

      - name: Run Docker container
        run: |
          docker run -d --rm \
            --name fit4110-gate-lab04 \
            -p 8000:8000 \
            --env-file .env.example \
            fit4110/access-gate:lab04

      - name: Wait for service ready
        run: npx wait-on http://localhost:8000/health --timeout 30000

      - name: Health check
        run: |
          curl -sf http://localhost:8000/health
          echo ""
          echo "Health check passed!"

      - name: Run Newman against Docker container
        run: npm run test:local

      - name: Capture container logs
        if: always()
        run: docker logs fit4110-gate-lab04 || true

      - name: Stop container
        if: always()
        run: docker stop fit4110-gate-lab04 || true

      - name: Upload Newman reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lab04-gate-newman-reports
          path: reports/
